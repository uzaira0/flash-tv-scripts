
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  allowlist_external_dirs:
    - "/config"
    - "/123XXX_data"

#notify:
#  - platform: file
#    name: tvpowerdatafilenotify
#    filename: "/123XXX_data/123XXX_tv_power_5s.csv"
#    timestamp: True

sensor:
  - platform: systemmonitor
    resources:
    - type: disk_use_percent
    - type: memory_use_percent		
    - type: memory_use
    - type: memory_free
    - type: swap_use_percent
    - type: swap_use		
    - type: swap_free
    
automation:  

- alias: Backup TV Power Data from Smart Plug Every 5 Seconds
  description: ""
  initial_state: 'on'
  triggers:
  - trigger: time_pattern
    seconds: "/5"
  conditions: []
  actions:
  - action: notify.send_message
    data:
      message: '{{states(''sensor.third_reality_inc_3rsp02028bz_power'')}};{{now().strftime(''%m.%d.%Y'')}};
        {{now().strftime(''%H.%M.%S'')}}'
    target:
      entity_id: notify.file
  mode: single

- alias: Try to Turn Smart Plug On Every 30 Seconds
  description: ""
  initial_state: 'on'
  triggers:
  - trigger: time_pattern
    seconds: "/30"
  conditions: []
  actions:
  - action: switch.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: switch.third_reality_inc_3rsp02028bz
  mode: single
